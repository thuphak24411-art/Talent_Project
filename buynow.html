<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <script src="js/app.js"></script>
<script src="js/data.js"></script>
  <title>page</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/mainstyle.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="menu">
                <i class="fas fa-bars"></i>
            </div>
            <div class="right-section">
        <div class="filter-bell">
            <i class="fas fa-bell"></i>
        </div>

        <div class="filter-icons">
            <i class="fas fa-filter"></i>
        </div>

        <div class="auth-buttons">
          <i class="fa-solid fa-circle-user"></i>
        
        </div>
    </div>
        </div>

        <div class="header-bottom">
            <div class="logo">
                GREEN THREAD
            </div>

            <div class="search-section">
                <div class="search-bar">
                    <input type="text" placeholder="Tìm kiếm sản phẩm...">
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <i class="fas fa-shopping-cart cart-icon"></i>
            </div>
        </div>
    </header>
    <div class="cart">
      <table>
        <tr>
          <td colspan="2">
            <h1>Order Details</h1>
            <hr>
            <p><input type="number" id="amount"> <img src="" alt=""> Tên sản phẩm 1 <input type="number" id="price"><label for="price">VNĐ</label></p>
            <hr>
             <p><input type="number" id="amount"> <img src="" alt=""> Tên sản phẩm 2 <input type="number" id="price"><label for="price">VNĐ</label></p>
            <hr>
            <p> <label for="shippingfee">Shipping Fee</label> <input type="number" id="shippingfee" style="text-align: right;"></p>
            <p> <label for="TAX">Tax</label> <input type="number" id="Tax" style="text-align: right;"></p>
            <p> <label for="total">Total</label> <input type="number" id="total" style="text-align: right;"></p>
             <button class="checkout-btn">
            <i class="fa-solid fa-credit-card"></i>
                Buy Now
             </button>
          </td>
          
        </tr>
        <tr>
          <td>
            <h3>Chechout Details</h3>
            <div class="ship">
              <i class="fa-solid fa-toggle-on"> Green Shipping 🌿</i>
              <p>Activate Carbon-Neutral Shipping <br> (<input type="number" id="priceship" value="2.50"><label for="priceship">VNĐ)</label></p>
            </div>
            <div class="carbon">
              <i class="fa-solid fa-leaf"></i>
              <span>CO₂ Impact Reduced: <input type="number" id="CO₂" value="0.35"> <label for="CO₂">kg</label></span>
              </div>
          </td>
          

         
        </tr>
        <tr>
          <td>
            <div class="payment-methods">

        <h2>Payment Methods</h2>

        <h3>Crypto Wallet</h3>

        <div class="wallet-grid">

            <div class="wallet-card">
                <img src="images/download.png" alt="MetaMask">
                <span>MetaMask</span>
            </div>

            <div class="wallet-card">
                <img src="images/ledger.png" alt="Ledger">
                <span>Ledger</span>
            </div>

            <div class="wallet-card">
                <img src="images/wallet.png" alt="Wallet">
                <span>Wallet</span>
            </div>

        </div>

        <h3>Local E-wallets</h3>

          <div class="wallet-grid">

              <div class="wallet-card">
                  <img src="images/paynow.png" alt="PayNow">
              </div>

              <div class="wallet-card">
                  <img src="images/gcash.jpg" alt="GCash">
              </div>

              <div class="wallet-card">
                  <img src="images/kakaopay.png" alt="KakaoPay">
              </div>

          </div>
          <h3>Thanh toán ghi nhận hàng</h3>
          <button class="cod-btn">
                <i class="fa-solid fa-money-bill-wave"></i>
                Cash on Delivery
            </button>


      </div>


          </td>
        </tr>

      </table>

    </div>

</body>
</html>
