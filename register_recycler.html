<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Recycler Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <div class="form-recycler">
            <h2>Create Recycler Account</h2>
            <form>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Recycler Name">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-user-tag"></i>
                    <input type="text" placeholder="User Name">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="Recycler Email">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" placeholder="Recycler Phone">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-map-marker"></i>
                    <input type="text" placeholder="Recycler Address">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-building"></i>
                    <input type="text" placeholder="Bank Name">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-credit-card"></i>
                    <input type="text" placeholder="Bank Account">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-receipt"></i>
                    <input type="text" placeholder="Tax Code">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" placeholder="Legal Representative">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Confirm Password">
                </div>
                <button type="submit">Sign up</button>
            </form>
            <p>Already have an account? <a href="login.html">Login</a></p>
            <div class="other-opt">
                <p>Sign up as:</p>
                <a href="register.html">Customer</a>
                <a href="register_brand.html">Brand</a>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
