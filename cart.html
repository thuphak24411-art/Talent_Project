<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
   <script src="js/app.js"></script>
    <script src="js/data.js"></script>
  <title>page</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/mainstyle.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="menu">
                <i class="fas fa-bars"></i>
            </div>
            <div class="right-section">
        <div class="filter-bell">
            <i class="fas fa-bell"></i>
        </div>

        <div class="filter-icons">
            <i class="fas fa-filter"></i>
        </div>

        <div class="auth-buttons">
          <i class="fa-solid fa-circle-user"></i>
        
        </div>
    </div>
        </div>

        <div class="header-bottom">
            <div class="logo">
                GREEN THREAD
            </div>

            <div class="search-section">
                <div class="search-bar">
                    <input type="text" placeholder="Tìm kiếm sản phẩm...">
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <i class="fas fa-shopping-cart cart-icon"></i>
            </div>
        </div>
    </header>

  <div class="cart-container">
    <!-- Danh sách sản phẩm -->
    <div class="cart-items">
        <h2>🛒 My Cart</h2>

        <div class="select-all">
            <input type="checkbox" id="selectAll">
            <label for="selectAll">Select All</label>
        </div>

        <div class="cart-item">
            <input type="checkbox" class="product-check">

            <img src="images/shirt1.jpg" alt="Product">

            <div class="product-info">
                <h4>Organic Cotton T-Shirt</h4>
                <p>120,000 VNĐ</p>
            </div>

            <div class="quantity">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>

            <div class="item-total">
                120,000 VNĐ
            </div>
        </div>

        <div class="cart-item">
            <input type="checkbox" class="product-check">

            <img src="images/shirt2.jpg" alt="Product">

            <div class="product-info">
                <h4>Eco Hoodie</h4>
                <p>250,000 VNĐ</p>
            </div>

            <div class="quantity">
                <button>-</button>
                <span>2</span>
                <button>+</button>
            </div>

            <div class="item-total">
                500,000 VNĐ
            </div>
        </div>
    </div>
     <!-- Tóm tắt đơn hàng -->
    <div class="cart-summary">
        <h3>Checkout Details</h3>

        <div class="summary-row">
            <span>Subtotal</span>
            <span>620,000 VNĐ</span>
        </div>

        <div class="summary-row">
            <span>Shipping</span>
            <span>20,000 VNĐ</span>
        </div>

        <div class="summary-row">
            <span>Tax</span>
            <span>10,000 VNĐ</span>
        </div>

        <hr>

        <div class="summary-row total">
            <span>Total</span>
            <span>650,000 VNĐ</span>
        </div>

        <div class="green-shipping">
            <i class="fa-solid fa-leaf"></i>
            Green Shipping 🌿
            <p>Carbon-neutral delivery available</p>
        </div>

        <button class="checkout-btn">
            <i class="fa-solid fa-credit-card"></i>
            Buy Now
        </button>

    </div>

 
</div>

   
</div>
</body>
</html>
