<html>
<head>
    <meta charset="UTF-8">
    <title>Product Information Entry</title>
       <script src="js/app.js"></script>
    <script src="js/data.js"></script>
    <link rel="stylesheet" href="..//css/productEntry.css">
    <link rel="stylesheet" href="..//css/header.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="menu">
                <i class="fas fa-bars"></i>
            </div>

            <div class="filter-icons">
                <i class="fas fa-filter"></i>
            </div>

            <div class="auth-buttons">
                <button class="login-btn">Login</button>
                <button class="signup-btn">Sign Up</button>
            </div>
        </div>

        <div class="header-bottom">
            <div class="logo">
                GREEN THREAD
            </div>

            <div class="search-section">
                <div class="search-bar">
                    <input type="text" placeholder="Tìm kiếm sản phẩm...">
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <i class="fas fa-shopping-cart cart-icon"></i>
            </div>
        </div>
    </header>

    <div class="container">
        <h2>Product Information Entry</h2>

        <div class="dashboard">

            <!-- LEFT COLUMN -->
            <div class="column">

                <div class="card">
                    <h2>Product Images</h2>

                    <div class="media-section">
                        <div class="upload-grid" id="uploadGrid">
                            <button type="button" class="upload-btn" onclick="triggerFileInput(0)">Upload</button>
                            <button type="button" class="upload-btn" onclick="triggerFileInput(1)">Upload</button>
                            <button type="button" class="upload-btn" onclick="triggerFileInput(2)">Upload</button>
                            <button type="button" class="upload-btn" onclick="triggerFileInput(3)">Upload</button>
                            <button type="button" class="upload-btn" onclick="triggerFileInput(4)">Upload</button>
                            <button type="button" class="upload-btn" onclick="triggerFileInput(5)">Upload</button>
                            <button type="button" class="upload-btn" onclick="triggerFileInput(6)">Upload</button>
                            <button type="button" class="upload-btn" onclick="triggerFileInput(7)">Upload</button>
                        </div>
                        
                        <!-- Hidden file inputs -->
                        <input type="file" id="fileInput0" accept="image/*" style="display:none;" onchange="handleImageUpload(0)">
                        <input type="file" id="fileInput1" accept="image/*" style="display:none;" onchange="handleImageUpload(1)">
                        <input type="file" id="fileInput2" accept="image/*" style="display:none;" onchange="handleImageUpload(2)">
                        <input type="file" id="fileInput3" accept="image/*" style="display:none;" onchange="handleImageUpload(3)">
                        <input type="file" id="fileInput4" accept="image/*" style="display:none;" onchange="handleImageUpload(4)">
                        <input type="file" id="fileInput5" accept="image/*" style="display:none;" onchange="handleImageUpload(5)">
                        <input type="file" id="fileInput6" accept="image/*" style="display:none;" onchange="handleImageUpload(6)">
                        <input type="file" id="fileInput7" accept="image/*" style="display:none;" onchange="handleImageUpload(7)">

                    </div>
                </div>

                <div class="card">
                    <h2>Basic Product Details</h2>

                    <label>Product Name</label>
                    <input type="text" required>

                    <label>SKU</label>
                    <input type="text" required>

                    <label>Category</label>
                    <select required>
                        <option value="">Select a category</option>
                        <option>Sweaters</option>
                        <option>Pants</option>
                        <option>Shirts</option>
                    </select>

                    <label>Price</label>
                    <input type="number" placeholder="Enter price" required>
                </div>

            </div>

            <!-- CENTER COLUMN -->
            <div class="column">

                <div class="card">
                    <h2>Size & Inventory Matrix</h2>

                    <label>Sizes</label>
                    <div id="sizeList" class="size-list">
                        <div class="size-item">
                            <select class="size-select" required>
                                <option value="">Select a size</option>
                                <option>S</option>
                                <option>M</option>
                                <option>L</option>
                                <option>XL</option>
                                <option>XXL</option>
                            </select>
                            <button type="button" class="remove-size-btn" onclick="removeSizeVariant(this)">Remove</button>
                        </div>
                    </div>
                    <button type="button" class="add-size-btn" onclick="addSizeVariant()">+ Add Size</button>

                    <div id="colorStockMatrix" class="color-stock-matrix" style="display:none; margin-top:20px;">
                        <h3>Color, Price & Stock by Size</h3>
                        <div id="matrixContent"></div>
                    </div>

                    <div id="colorPriceList" class="color-price-list">
                        <div class="color-price-item">
                            <input type="text" placeholder="Color name" class="color-name" required>
                            <input type="number" placeholder="Price" class="color-price" min="0" step="0.01" required>
                            <input type="number" placeholder="Stock" class="color-stock" min="0" required>
                            <button type="button" class="remove-color-btn" onclick="removeColorPrice(this)">Remove</button>
                        </div>
                    </div>
                    
                    <button type="button" class="add-color-btn" onclick="addColorPrice()">+ Add Color & Price</button>
                    <label>Warehouse Location</label>
                    <select>
                        <option>TP.HCM</option>
                        <option>Hanoi</option>
                        <option>Danang</option>
                    </select>

                </div>

                <div class="card">
                    <h2>Material & Sustainability Profile</h2>

                    <label>Base Material</label>
                    <select>
                        <option>Recycled Wool, Tencel Blend</option>
                    </select>

                    <label>% Recycled Content</label>
                    <input type="range" min="0" max="100" value="75">

                    <label>Traceability Source ID</label>

                    <div class="trace">
                        <input type="text" placeholder="Traceability Source ID">
                        <button class="verify-btn">Blockchain Verify</button>
                    </div>

                    <label>Eco Reward Points</label>
                    <input type="number" value="100">

                    <div class="score-box">
                        <h3>92%</h3>
                        <p>Auto Calculating</p>
                    </div>

                </div>

            </div>

            <!-- RIGHT COLUMN -->
            <div class="column">

                <div class="action-buttons">
                    <button class="publish">Save & Publish</button>
                    <button class="draft">Save as Draft</button>
                </div>

                <div class="card">
                    <h2>Carbon & Certification</h2>

                    <label>Est. CO2 Footprint</label>
                    <input type="number">

                    <label>Est. Water Consumed</label>
                    <input type="number">

                    <div class="stat-box">
                        <div>CO2<br><strong>55 Tons</strong></div>
                        <div>Water<br><strong>10k Kg</strong></div>
                    </div>

                    <h2>Certification Uploads</h2>

                    <button class="green-btn">ESG Certification PDF</button>
                    <button class="green-btn">Organic Content Standard OCS</button>
                    <button class="green-btn">Recycled Content Standard RCS</button>

                </div>

                <div class="card">
                    <h2>Blockchain Verification</h2>

                    <button class="green-btn">
                        Generate Blockchain Traceability Hash
                    </button>

                    <button class="verify-btn">
                        Verify with QR
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script>
        // Array to store uploaded images
        let uploadedImages = [null, null, null, null, null, null, null, null];

        // Trigger file input when button is clicked
        function triggerFileInput(index) {
            document.getElementById('fileInput' + index).click();
        }

        // Handle image upload
        function handleImageUpload(index) {
            const fileInput = document.getElementById('fileInput' + index);
            const file = fileInput.files[0];

            if (!file) return;

            // Check if file is an image
            if (!file.type.startsWith('image/')) {
                alert('Vui lòng chọn một tệp hình ảnh!');
                return;
            }

            // Check file size (max 5MB)
            const maxSize = 5 * 1024 * 1024;
            if (file.size > maxSize) {
                alert('Kích thước tệp không được vượt quá 5MB!');
                return;
            }

            // Check if we've reached max 8 images
            const uploadedCount = uploadedImages.filter(img => img !== null).length;
            if (uploadedCount >= 8) {
                alert('Bạn chỉ có thể upload tối đa 8 ảnh!');
                return;
            }

            // Read file and display image
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImages[index] = e.target.result;
                updateUploadGrid();
            };
            reader.readAsDataURL(file);
        }

        // Update upload grid to show uploaded images
        function updateUploadGrid() {
            const uploadGrid = document.getElementById('uploadGrid');
            const buttons = uploadGrid.querySelectorAll('button');

            buttons.forEach((button, index) => {
                if (uploadedImages[index]) {
                    // Replace button with image preview
                    const img = document.createElement('img');
                    img.src = uploadedImages[index];
                    img.style.cursor = 'pointer';
                    img.onclick = () => triggerFileInput(index);

                    button.replaceWith(img);
                    uploadGrid.appendChild(img);
                } else {
                    // Keep button for empty slots
                    const newButton = document.createElement('button');
                    newButton.type = 'button';
                    newButton.className = 'upload-btn';
                    newButton.textContent = 'Upload';
                    newButton.onclick = () => triggerFileInput(index);
                    button.replaceWith(newButton);
                    uploadGrid.appendChild(newButton);
                }
            });
        }

        // Get uploaded images (useful for form submission)
        function getUploadedImages() {
            return uploadedImages.filter(img => img !== null);
        }

        // Clear all uploaded images
        function clearAllImages() {
            uploadedImages = [null, null, null, null, null, null, null, null];
            updateUploadGrid();
        }

        // ===== SIZE MANAGEMENT =====
        // Add new size variant
        function addSizeVariant() {
            const sizeList = document.getElementById('sizeList');
            const sizeItem = document.createElement('div');
            sizeItem.className = 'size-item';
            sizeItem.innerHTML = `
                <select class="size-select" required>
                    <option value="">Select a size</option>
                    <option>S</option>
                    <option>M</option>
                    <option>L</option>
                    <option>XL</option>
                    <option>XXL</option>
                </select>
                <button type="button" class="remove-size-btn" onclick="removeSizeVariant(this)">Remove</button>
            `;
            sizeList.appendChild(sizeItem);
        }

        // Remove size variant
        function removeSizeVariant(button) {
            button.parentElement.remove();
        }

        // Get all selected sizes
        function getSizes() {
            const sizeSelects = document.querySelectorAll('.size-select');
            const sizes = [];
            sizeSelects.forEach(select => {
                if (select.value) {
                    sizes.push(select.value);
                }
            });
            return sizes;
        }

        // ===== COLOR & PRICE MANAGEMENT =====
        // Add new color and price field
        function addColorPrice() {
            const colorPriceList = document.getElementById('colorPriceList');
            const colorPriceItem = document.createElement('div');
            colorPriceItem.className = 'color-price-item';
            colorPriceItem.innerHTML = `
                <input type="text" placeholder="Color name (e.g., Red, Blue)" class="color-name" required>
                <input type="number" placeholder="Price" class="color-price" min="0" step="0.01" required>
                <input type="number" placeholder="Stock" class="color-stock" min="0" required>
                <button type="button" class="remove-color-btn" onclick="removeColorPrice(this)">Remove</button>
            `;
            colorPriceList.appendChild(colorPriceItem);
        }

        // Remove color and price field
        function removeColorPrice(button) {
            const colorPriceItem = button.parentElement;
            colorPriceItem.remove();
        }

        // Get all colors, prices and stock
        function getColorPriceStock() {
            const colorPriceItems = document.querySelectorAll('.color-price-item');
            const colors = [];
            
            colorPriceItems.forEach(item => {
                const name = item.querySelector('.color-name').value;
                const price = item.querySelector('.color-price').value;
                const stock = item.querySelector('.color-stock').value;
                
                if (name && price && stock) {
                    colors.push({
                        name: name,
                        price: parseFloat(price),
                        stock: parseInt(stock)
                    });
                }
            });
            
            return colors;
        }

        // Get all product variants (Size x Color combinations)
        function getProductVariants() {
            const sizes = getSizes();
            const colors = getColorPriceStock();
            const variants = [];
            
            sizes.forEach(size => {
                colors.forEach(colorData => {
                    variants.push({
                        size: size,
                        color: colorData.name,
                        price: colorData.price,
                        stock: colorData.stock
                    });
                });
            });
            
            return variants;
        }
    </script>

</body>
</html>
